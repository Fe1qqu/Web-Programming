<!DOCTYPE html>
<html>
<head>
<title>2</title>

<style>

    div{
        width:200px;
        height:200px;
        position:absolute;
    }
    
    .red{
        background:red;
        top:50px;
        left:50px;
    }
    
    .green{
        background:green;
        bottom:0;
        right:0;
    }
    
    .blue{
        background:blue;
        bottom:0;
        left:0;
    }
    
    .yellow{
        background:yellow;
        bottom:-180px;
        right:-180px;
    }
    
</style>

</head>

<body>

<div class="red"></div>
<div class="green"></div>
<div class="blue"></div>
<div class="yellow"></div>

</body>
</html>
