<!DOCTYPE html>
<html>
<head>
<title>5_1</title>

<style>

body{
    margin:0;
}

.layout{
    position:relative;
    width:800px;
    height:500px;
    margin:20px auto;
    background:#fffaf0;
    border:1px solid #000;
}

.header{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100px;
    background:#8B0000;
}

.menu{
    position:absolute;
    top:100px;
    left:0;
    width:150px;
    font-weight:bold;
}

.content{
    position:absolute;
    top:100px;
    left:200px;
    font-weight:bold;
}

.news{
    position:absolute;
    top:120px;
    right:20px;
    width:180px;
    height:320px;
    background:#FFFF00;
}

.footer{
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    height:40px;
    background:#8B0000;
}

</style>
</head>

<body>

<div class="layout">

<div class="header">шапка сайта</div>

<div class="menu">меню</div>

<div class="content">контент</div>

<div class="news">блок новостей</div>

<div class="footer">низ сайта</div>

</div>

</body>
</html>
