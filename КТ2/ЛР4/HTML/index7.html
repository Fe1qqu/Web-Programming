<!DOCTYPE html>
<html>
<head>
<title>7</title>

<style>

.sprite {
    display: inline-block;
    width: 512px;
    height: 512px;
    background-image: url('../images/sprites.png');
    background-repeat: no-repeat;
    vertical-align: middle;
    cursor: pointer;
}

.telegram {
    background-position: -542px -10px;
}
.telegram:hover {
    background-position: -10px -10px;
}

.vegetable {
    background-position: -542px -542px;
}
.vegetable:hover {
    background-position: -10px -542px;
}

.weather {
    background-position: -1074px -542px;
}
.weather:hover {
    background-position: -1074px -10px;
}

</style>
</head>
<body>

<div class="sprite telegram"></div>
<div class="sprite vegetable"></div>
<div class="sprite weather"></div>

</body>
</html>
