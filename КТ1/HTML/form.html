<!DOCTYPE html>
<html>
<head>
    <title>
        Форма
    </title>
</head>
<body>

<form>

    <p>Ваше имя:</p>
    <input type="text" name="name" value="Введите имя">

    <p>Email:</p>
    <input type="text" name="email" value="Введите email">

    <p>Сообщение:</p>
    <textarea cols="20" rows="5"></textarea>

    <p>
        <input type="checkbox"> Согласие на обработку персональных данных
    </p>

    <input type="reset" value="Очистить">
    <input type="submit" value="Отправить">

</form>

</body>
</html>
